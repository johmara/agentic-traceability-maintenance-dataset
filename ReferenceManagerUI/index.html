<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reference Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c-bg: #f1f5f9;
      --c-surface: #ffffff;
      --c-sidebar: #0f172a;
      --c-sidebar-txt: #94a3b8;
      --c-sidebar-active-bg: rgba(59,130,246,.15);
      --c-sidebar-active: #60a5fa;
      --c-accent: #3b82f6;
      --c-accent-h: #2563eb;
      --c-text: #0f172a;
      --c-text2: #64748b;
      --c-border: #e2e8f0;
      --c-danger: #ef4444;
      --c-success: #22c55e;
      --c-blue-bg: #dbeafe;
      --c-blue-txt: #1e40af;
      --c-green-bg: #dcfce7;
      --c-green-txt: #166534;
      --r: 8px;
      --sh: 0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
      --shm: 0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
    }
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background: var(--c-bg); color: var(--c-text); display: flex; height: 100vh; overflow: hidden; font-size: 14px; }

    /* ── Sidebar ── */
    .sidebar { width: 220px; background: var(--c-sidebar); display: flex; flex-direction: column; flex-shrink: 0; }
    .sb-brand { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,.07); }
    .sb-brand h1 { color: #f8fafc; font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .sb-brand p { color: var(--c-sidebar-txt); font-size: 11px; margin-top: 2px; }
    .sb-nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; }
    .nav-btn { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border: none; background: none; color: var(--c-sidebar-txt); border-radius: 6px; cursor: pointer; font-size: 13px; width: 100%; text-align: left; transition: background .12s, color .12s; }
    .nav-btn:hover { background: rgba(255,255,255,.05); color: #cbd5e1; }
    .nav-btn.active { background: var(--c-sidebar-active-bg); color: var(--c-sidebar-active); }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-cnt { margin-left: auto; background: rgba(255,255,255,.1); color: #94a3b8; font-size: 11px; padding: 1px 6px; border-radius: 10px; min-width: 22px; text-align: center; }
    .nav-btn.active .nav-cnt { background: rgba(59,130,246,.2); color: var(--c-sidebar-active); }
    .sb-foot { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.07); }
    .api-pill { display: flex; align-items: center; gap: 7px; cursor: pointer; border-radius: 6px; padding: 5px 4px; transition: background .12s; }
    .api-pill:hover { background: rgba(255,255,255,.05); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #475569; flex-shrink: 0; transition: background .3s; }
    .dot.ok { background: var(--c-success); }
    .dot.err { background: var(--c-danger); }
    .api-lbl { font-size: 11px; color: var(--c-sidebar-txt); }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .section { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    .section.hidden { display: none; }

    /* Section header */
    .sec-hdr { background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 12px 20px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .sec-title { font-size: 17px; font-weight: 700; flex: 1; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: background .12s, transform .08s; white-space: nowrap; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--c-accent); color: #fff; }
    .btn-primary:hover { background: var(--c-accent-h); }
    .btn-secondary { background: var(--c-surface); border: 1px solid var(--c-border); color: var(--c-text); }
    .btn-secondary:hover { background: var(--c-bg); }
    .btn-ghost { background: none; border: none; color: var(--c-text2); padding: 4px 8px; }
    .btn-ghost:hover { background: var(--c-bg); color: var(--c-text); }
    .btn-danger { background: var(--c-danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 9px; font-size: 11px; }

    /* Search bar */
    .search-bar { background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 9px 20px; display: flex; gap: 7px; align-items: center; flex-shrink: 0; }
    .search-inp { flex: 1; min-width: 0; padding: 7px 11px; border: 1px solid var(--c-border); border-radius: 6px; font-size: 13px; outline: none; background: var(--c-bg); transition: border-color .15s, box-shadow .15s; }
    .search-inp:focus { border-color: var(--c-accent); background: var(--c-surface); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .sel, .yr-inp { padding: 7px 8px; border: 1px solid var(--c-border); border-radius: 6px; font-size: 12px; background: var(--c-bg); outline: none; cursor: pointer; }
    .yr-inp { width: 70px; }

    /* Content area */
    .content { flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 0; }

    /* Split: list | detail */
    .split { display: grid; gap: 14px; align-items: start; }
    .split.has-detail { grid-template-columns: 1fr 360px; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 10px; }
    .card { background: var(--c-surface); border-radius: var(--r); padding: 13px; box-shadow: var(--sh); cursor: pointer; border: 2px solid transparent; transition: box-shadow .15s, border-color .15s; }
    .card:hover { box-shadow: var(--shm); }
    .card.sel { border-color: var(--c-accent); }
    .card-ttl { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 7px; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .card-abs { font-size: 11px; color: var(--c-text2); margin-top: 7px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tag { padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .tag-b { background: var(--c-blue-bg); color: var(--c-blue-txt); }
    .tag-g { background: var(--c-green-bg); color: var(--c-green-txt); }
    .meta-t { font-size: 11px; color: var(--c-text2); }

    /* Group cards */
    .g-card { background: var(--c-surface); border-radius: var(--r); padding: 13px; box-shadow: var(--sh); cursor: pointer; border: 2px solid transparent; transition: box-shadow .15s, border-color .15s; }
    .g-card:hover { box-shadow: var(--shm); }
    .g-card.sel { border-color: var(--c-accent); }
    .g-name { font-size: 14px; font-weight: 600; }
    .g-desc { font-size: 12px; color: var(--c-text2); margin-top: 4px; line-height: 1.4; }
    .g-cnt { font-size: 11px; color: var(--c-text2); margin-top: 8px; }

    /* Detail panel */
    .detail { background: var(--c-surface); border-radius: var(--r); box-shadow: var(--sh); padding: 16px; position: sticky; top: 0; max-height: calc(100vh - 160px); overflow-y: auto; }
    .d-hdr { display: flex; gap: 6px; margin-bottom: 12px; }
    .d-ttl { font-size: 14px; font-weight: 700; line-height: 1.4; margin-bottom: 10px; }
    .d-sec { margin-bottom: 10px; }
    .d-lbl { font-size: 10px; font-weight: 700; color: var(--c-text2); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 3px; }
    .d-val { font-size: 12px; line-height: 1.5; }
    .chip { display: inline-flex; align-items: center; background: #f1f5f9; border-radius: 20px; padding: 2px 8px; font-size: 11px; margin: 2px; }
    .chip-b { background: var(--c-blue-bg); color: var(--c-blue-txt); }
    .div { height: 1px; background: var(--c-border); margin: 10px 0; }

    /* Table */
    .tbl-wrap { background: var(--c-surface); border-radius: var(--r); box-shadow: var(--sh); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 700; color: var(--c-text2); text-transform: uppercase; letter-spacing: .6px; background: #f8fafc; border-bottom: 1px solid var(--c-border); }
    tbody td { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--c-border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background .1s; }
    tbody tr:hover td { background: #f8fafc; }
    tbody tr.sel td { background: #eff6ff; }

    /* States */
    .empty { text-align: center; padding: 60px 20px; color: var(--c-text2); }
    .empty-ic { font-size: 36px; margin-bottom: 10px; }
    .empty-t { font-size: 13px; }
    .loading { text-align: center; padding: 40px 20px; color: var(--c-text2); font-size: 13px; }

    /* Pagination */
    .pager { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 0 0; }
    .pager button { padding: 5px 12px; border: 1px solid var(--c-border); border-radius: 6px; background: var(--c-surface); font-size: 12px; cursor: pointer; }
    .pager button:hover:not(:disabled) { background: var(--c-bg); }
    .pager button:disabled { opacity: .4; cursor: default; }
    .pager-info { font-size: 12px; color: var(--c-text2); }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(2px); }
    .modal.hidden { display: none; }
    .modal-box { background: var(--c-surface); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.2); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-hdr { padding: 16px 18px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-hdr-t { font-size: 15px; font-weight: 700; }
    .modal-x { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--c-text2); padding: 2px 6px; border-radius: 4px; }
    .modal-x:hover { background: var(--c-bg); }
    .modal-body { padding: 14px 18px 18px; }

    /* Forms */
    .ff { margin-bottom: 12px; }
    .ff label { display: block; font-size: 10px; font-weight: 700; color: var(--c-text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
    .ff input, .ff textarea, .ff select { width: 100%; padding: 7px 10px; border: 1px solid var(--c-border); border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s; }
    .ff input:focus, .ff textarea:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
    .ff textarea { resize: vertical; min-height: 70px; }
    .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .f-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--c-border); }

    /* Toasts */
    #toasts { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
    .toast { padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; box-shadow: var(--shm); animation: tin .2s ease; pointer-events: auto; }
    .toast-ok { background: #166534; color: #dcfce7; }
    .toast-err { background: #991b1b; color: #fee2e2; }
    @keyframes tin { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-brand">
    <h1>Reference Manager</h1>
    <p>Frontend Demo</p>
  </div>
  <nav class="sb-nav">
    <button class="nav-btn active" data-nav="papers">
      <span class="nav-icon">📄</span> Papers
      <span class="nav-cnt" id="cnt-papers">–</span>
    </button>
    <button class="nav-btn" data-nav="groups">
      <span class="nav-icon">🗂</span> Groups
      <span class="nav-cnt" id="cnt-groups">–</span>
    </button>
    <button class="nav-btn" data-nav="authors">
      <span class="nav-icon">👤</span> Authors
      <span class="nav-cnt" id="cnt-authors">–</span>
    </button>
  </nav>
  <div class="sb-foot">
    <div class="api-pill" id="api-pill" title="Click to change API URL">
      <div class="dot" id="dot"></div>
      <span class="api-lbl" id="api-lbl">Connecting…</span>
    </div>
  </div>
</aside>

<div class="main">

  <!-- PAPERS -->
  <div id="sec-papers" class="section">
    <div class="sec-hdr">
      <h1 class="sec-title">Papers</h1>
      <button class="btn btn-secondary btn-sm" id="btn-export">⬇ BibTeX</button>
      <button class="btn btn-secondary btn-sm" id="btn-import">⬆ Import</button>
      <button class="btn btn-primary btn-sm" id="btn-add-paper">+ Add</button>
    </div>
    <div class="search-bar">
      <input type="search" id="p-search" class="search-inp" placeholder="Search title, abstract, author…" />
      <select id="p-grp" class="sel"><option value="">All groups</option></select>
      <input type="number" id="p-from" class="yr-inp" placeholder="From" />
      <input type="number" id="p-to" class="yr-inp" placeholder="To" />
    </div>
    <div id="papers-el" class="content"></div>
  </div>

  <!-- GROUPS -->
  <div id="sec-groups" class="section hidden">
    <div class="sec-hdr">
      <h1 class="sec-title">Groups</h1>
      <button class="btn btn-primary btn-sm" id="btn-add-grp">+ Add</button>
    </div>
    <div id="groups-el" class="content"></div>
  </div>

  <!-- AUTHORS -->
  <div id="sec-authors" class="section hidden">
    <div class="sec-hdr">
      <h1 class="sec-title">Authors</h1>
    </div>
    <div id="authors-el" class="content"></div>
  </div>

</div>

<!-- Modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-hdr-t" id="modal-t">–</span>
      <button class="modal-x" id="modal-x">×</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<div id="toasts"></div>
<input type="file" id="bib-inp" accept=".bib" style="display:none" />

<script>
// ── Config ────────────────────────────────────────────────────────────
let API = 'http://localhost:5062/api/v1';

// ── API client ────────────────────────────────────────────────────────
const api = {
  async req(method, path, body, params) {
    const url = new URL(API + path);
    if (params) for (const [k,v] of Object.entries(params))
      if (v !== null && v !== undefined && v !== '') url.searchParams.set(k, v);
    const opts = { method };
    if (body !== undefined && body !== null) {
      opts.headers = { 'Content-Type': 'application/json' };
      opts.body = JSON.stringify(body);
    }
    let r;
    try { r = await fetch(url.toString(), opts); }
    catch { throw new Error('Network error — is the API running at ' + API + '?'); }
    if (!r.ok) {
      let msg = `${r.status} ${r.statusText}`;
      try { const j = await r.json(); msg = j.detail || j.title || j.message || msg; } catch {}
      throw new Error(msg);
    }
    if (r.status === 204) return null;
    const ct = r.headers.get('content-type') ?? '';
    return ct.includes('json') ? await r.json() : await r.text();
  },
  get:  (p, q)    => api.req('GET',    p, undefined, q),
  post: (p, b)    => api.req('POST',   p, b),
  put:  (p, b)    => api.req('PUT',    p, b),
  del:  (p)       => api.req('DELETE', p),
  async form(path, fd) {
    let r;
    try { r = await fetch(API + path, { method: 'POST', body: fd }); }
    catch { throw new Error('Network error'); }
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }
};

// ── Utils ─────────────────────────────────────────────────────────────
const h = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').append(el);
  setTimeout(() => el.remove(), 3500);
}

const emptyState = (icon, txt) =>
  `<div class="empty"><div class="empty-ic">${icon}</div><div class="empty-t">${txt}</div></div>`;
const errState = msg =>
  `<div class="empty"><div class="empty-ic">⚠️</div><div class="empty-t">${h(msg)}</div></div>`;

// ── State ─────────────────────────────────────────────────────────────
const S = {
  papers: [], pTotal: 0, pOff: 0, pLim: 20,
  pQ: '', pGrp: '', pFrom: '', pTo: '', pSel: null,
  groups: [], gSel: null,
  authors: [], aSel: null,
};

// ── Navigation ────────────────────────────────────────────────────────
document.querySelectorAll('[data-nav]').forEach(btn =>
  btn.addEventListener('click', () => {
    const sec = btn.dataset.nav;
    document.querySelectorAll('[data-nav]').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('hidden', s.id !== `sec-${sec}`));
    if (sec === 'papers')  loadPapers();
    if (sec === 'groups')  loadGroups();
    if (sec === 'authors') loadAuthors();
  }));

// ── API status ────────────────────────────────────────────────────────
async function pingApi() {
  const dot = document.getElementById('dot');
  const lbl = document.getElementById('api-lbl');
  try {
    await api.get('/papers', { limit: 1 });
    dot.className = 'dot ok'; lbl.textContent = 'Connected';
  } catch {
    dot.className = 'dot err'; lbl.textContent = 'API offline';
  }
}
document.getElementById('api-pill').addEventListener('click', () => {
  const u = prompt('API base URL:', API);
  if (u?.trim()) { API = u.trim(); pingApi(); loadPapers(); }
});

// ── Papers ────────────────────────────────────────────────────────────
let pTimer;
document.getElementById('p-search').addEventListener('input', e => {
  S.pQ = e.target.value; S.pOff = 0;
  clearTimeout(pTimer); pTimer = setTimeout(loadPapers, 280);
});
document.getElementById('p-grp').addEventListener('change', e => { S.pGrp = e.target.value; S.pOff = 0; loadPapers(); });
document.getElementById('p-from').addEventListener('change', e => { S.pFrom = e.target.value; S.pOff = 0; loadPapers(); });
document.getElementById('p-to').addEventListener('change', e => { S.pTo = e.target.value; S.pOff = 0; loadPapers(); });

async function loadPapers() {
  const el = document.getElementById('papers-el');
  el.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const filt = S.pQ || S.pGrp || S.pFrom || S.pTo;
    if (filt) {
      const d = await api.get('/papers/search', { q: S.pQ, groupId: S.pGrp, yearFrom: S.pFrom, yearTo: S.pTo, limit: S.pLim, offset: S.pOff });
      S.papers = d.items.map(x => x.paper); S.pTotal = d.total;
    } else {
      const d = await api.get('/papers', { limit: S.pLim, offset: S.pOff });
      S.papers = d.items; S.pTotal = d.total;
    }
    document.getElementById('cnt-papers').textContent = S.pTotal;
    renderPapers(el);
  } catch (e) { el.innerHTML = errState(e.message); }
}

function renderPapers(el) {
  if (!S.papers.length) { el.innerHTML = emptyState('📄', 'No papers found'); return; }

  const cards = S.papers.map(p => `
    <div class="card${S.pSel?.id === p.id ? ' sel' : ''}" data-pid="${p.id}">
      <div class="card-ttl">${h(p.title)}</div>
      <div class="card-meta">
        ${p.year ? `<span class="tag tag-b">${p.year}</span>` : ''}
        ${(p.authors ?? []).slice(0,2).map(a => `<span class="meta-t">${h(a.name)}</span>`).join('<span class="meta-t"> · </span>')}
        ${(p.authors ?? []).length > 2 ? `<span class="meta-t">+${p.authors.length-2}</span>` : ''}
        ${(p.groups ?? []).map(g => `<span class="tag tag-g">${h(g.name)}</span>`).join('')}
      </div>
      ${p.abstract ? `<div class="card-abs">${h(p.abstract)}</div>` : ''}
    </div>`).join('');

  const pg = pager(S.pTotal, S.pOff, S.pLim);

  el.innerHTML = S.pSel
    ? `<div class="split has-detail">
         <div><div class="cards">${cards}</div>${pg}</div>
         ${paperDetail(S.pSel)}
       </div>`
    : `<div class="cards">${cards}</div>${pg}`;

  el.querySelectorAll('[data-pid]').forEach(c =>
    c.addEventListener('click', () => { S.pSel = S.papers.find(p => p.id === +c.dataset.pid) ?? null; renderPapers(el); }));

  bindPaperDetail(el);
  bindPager(el, 'p');
}

function paperDetail(p) {
  return `
    <div class="detail" id="pd">
      <div class="d-hdr">
        <button class="btn btn-secondary btn-sm" id="pd-edit">✏ Edit</button>
        <button class="btn btn-danger btn-sm" id="pd-del">🗑 Delete</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" id="pd-close">✕</button>
      </div>
      <div class="d-ttl">${h(p.title)}</div>
      <div class="div"></div>
      ${p.year ? `<div class="d-sec"><div class="d-lbl">Year</div><div class="d-val">${p.year}</div></div>` : ''}
      ${p.doi ? `<div class="d-sec"><div class="d-lbl">DOI</div><div class="d-val"><a href="https://doi.org/${h(p.doi)}" target="_blank" rel="noopener">${h(p.doi)}</a></div></div>` : ''}
      ${p.journal ? `<div class="d-sec"><div class="d-lbl">Journal</div><div class="d-val">${h(p.journal)}</div></div>` : ''}
      ${p.booktitle ? `<div class="d-sec"><div class="d-lbl">Booktitle</div><div class="d-val">${h(p.booktitle)}</div></div>` : ''}
      ${(p.authors ?? []).length ? `<div class="d-sec"><div class="d-lbl">Authors</div><div>${p.authors.map(a => `<span class="chip">${h(a.name)}</span>`).join('')}</div></div>` : ''}
      ${(p.groups ?? []).length ? `<div class="d-sec"><div class="d-lbl">Groups</div><div>${p.groups.map(g => `<span class="chip chip-b">${h(g.name)}</span>`).join('')}</div></div>` : ''}
      ${p.abstract ? `<div class="d-sec"><div class="d-lbl">Abstract</div><div class="d-val" style="line-height:1.6">${h(p.abstract)}</div></div>` : ''}
    </div>`;
}

function bindPaperDetail(el) {
  const e = id => el.querySelector(id);
  e('#pd-close')?.addEventListener('click', () => { S.pSel = null; renderPapers(el); });
  e('#pd-edit')?.addEventListener('click', () => openPaperForm(S.pSel));
  e('#pd-del')?.addEventListener('click', async () => {
    if (!confirm(`Delete "${S.pSel.title}"?`)) return;
    try { await api.del(`/papers/${S.pSel.id}`); S.pSel = null; toast('Paper deleted'); loadPapers(); }
    catch (ex) { toast(ex.message, 'err'); }
  });
}

document.getElementById('btn-add-paper').addEventListener('click', () => openPaperForm(null));

function openPaperForm(paper) {
  const edit = !!paper;
  openModal(edit ? 'Edit Paper' : 'Add Paper', `
    <div class="ff"><label>Title *</label><input id="fp-ttl" value="${h(paper?.title ?? '')}" /></div>
    <div class="f-row">
      <div class="ff"><label>Year</label><input id="fp-yr" type="number" value="${paper?.year ?? ''}" /></div>
      <div class="ff"><label>DOI</label><input id="fp-doi" value="${h(paper?.doi ?? '')}" /></div>
    </div>
    <div class="f-row">
      <div class="ff"><label>Journal</label><input id="fp-jrn" value="${h(paper?.journal ?? '')}" /></div>
      <div class="ff"><label>Booktitle</label><input id="fp-bk" value="${h(paper?.booktitle ?? '')}" /></div>
    </div>
    <div class="ff"><label>Authors (comma-separated)</label>
      <input id="fp-aut" value="${h((paper?.authors ?? []).map(a => a.name).join(', '))}" placeholder="Jane Doe, John Smith" /></div>
    <div class="ff"><label>Abstract</label><textarea id="fp-abs">${h(paper?.abstract ?? '')}</textarea></div>
    <div class="f-foot">
      <button class="btn btn-secondary" id="mc">Cancel</button>
      <button class="btn btn-primary" id="ms">${edit ? 'Save' : 'Create'}</button>
    </div>`);

  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('ms').addEventListener('click', async () => {
    const title = document.getElementById('fp-ttl').value.trim();
    if (!title) { toast('Title is required', 'err'); return; }
    const authors = document.getElementById('fp-aut').value.split(',')
      .map(s => s.trim()).filter(Boolean)
      .map(name => ({ name, email: null, affiliations: [] }));
    const body = {
      title,
      year: parseInt(document.getElementById('fp-yr').value) || 0,
      doi: document.getElementById('fp-doi').value.trim() || null,
      journal: document.getElementById('fp-jrn').value.trim() || null,
      booktitle: document.getElementById('fp-bk').value.trim() || null,
      abstract: document.getElementById('fp-abs').value.trim() || null,
      authors,
    };
    try {
      if (edit) { S.pSel = await api.put(`/papers/${paper.id}`, body); toast('Paper updated'); }
      else { await api.post('/papers', body); S.pSel = null; toast('Paper created'); }
      closeModal(); loadPapers();
    } catch (ex) { toast(ex.message, 'err'); }
  });
}

// BibTeX import / export
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('bib-inp').click());
document.getElementById('bib-inp').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('file', file);
  try {
    const r = await api.form('/papers/import/bibtex', fd);
    toast(`Imported ${r.created}, skipped ${r.skipped}`); loadPapers();
  } catch (ex) { toast(ex.message, 'err'); }
  e.target.value = '';
});

document.getElementById('btn-export').addEventListener('click', async () => {
  try {
    const params = S.pGrp ? { groupId: S.pGrp } : {};
    const text = await api.get('/papers/export/bibtex', params);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
    a.download = 'references.bib';
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(a.href);
    toast('BibTeX exported');
  } catch (e) { toast(e.message, 'err'); }
});

// ── Groups ────────────────────────────────────────────────────────────
async function loadGroups() {
  const el = document.getElementById('groups-el');
  el.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const d = await api.get('/groups', { limit: 100 });
    S.groups = d.items;
    document.getElementById('cnt-groups').textContent = d.total;
    if (S.gSel) S.gSel = S.groups.find(g => g.id === S.gSel.id) ?? null;
    // sync filter dropdown
    const sel = document.getElementById('p-grp');
    sel.innerHTML = '<option value="">All groups</option>' +
      S.groups.map(g => `<option value="${g.id}"${S.pGrp == g.id ? ' selected' : ''}>${h(g.name)}</option>`).join('');
    renderGroups(el);
  } catch (e) { el.innerHTML = errState(e.message); }
}

function renderGroups(el) {
  if (!S.groups.length) { el.innerHTML = emptyState('🗂', 'No groups yet'); return; }

  const cards = S.groups.map(g => `
    <div class="g-card${S.gSel?.id === g.id ? ' sel' : ''}" data-gid="${g.id}">
      <div class="g-name">${h(g.name)}</div>
      ${g.description ? `<div class="g-desc">${h(g.description)}</div>` : ''}
      <div class="g-cnt">${(g.papers ?? []).length} paper${(g.papers ?? []).length !== 1 ? 's' : ''}</div>
    </div>`).join('');

  el.innerHTML = S.gSel
    ? `<div class="split has-detail"><div class="cards">${cards}</div>${groupDetail(S.gSel)}</div>`
    : `<div class="cards">${cards}</div>`;

  el.querySelectorAll('[data-gid]').forEach(c =>
    c.addEventListener('click', () => { S.gSel = S.groups.find(g => g.id === +c.dataset.gid) ?? null; renderGroups(el); }));

  bindGroupDetail(el);
}

function groupDetail(g) {
  const rows = (g.papers ?? []).length
    ? g.papers.map(p => `
        <tr>
          <td>${h(p.title)}</td>
          <td>${p.year ?? '–'}</td>
          <td><button class="btn btn-danger btn-sm" onclick="rmPaper(${g.id},${p.id})">✕</button></td>
        </tr>`).join('')
    : '<tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:16px">No papers</td></tr>';

  return `
    <div class="detail" id="gd">
      <div class="d-hdr">
        <button class="btn btn-secondary btn-sm" id="gd-edit">✏ Edit</button>
        <button class="btn btn-danger btn-sm" id="gd-del">🗑 Delete</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" id="gd-close">✕</button>
      </div>
      <div class="d-ttl">${h(g.name)}</div>
      ${g.description ? `<div style="color:#64748b;font-size:12px;margin-bottom:10px">${h(g.description)}</div>` : ''}
      <div class="div"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.7px">Papers (${(g.papers ?? []).length})</span>
        <button class="btn btn-secondary btn-sm" id="gd-add">+ Add Paper</button>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr><th>Title</th><th>Year</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
    </div>`;
}

window.rmPaper = async (gid, pid) => {
  try { await api.del(`/groups/${gid}/papers/${pid}`); toast('Removed from group'); loadGroups(); }
  catch (e) { toast(e.message, 'err'); }
};

function bindGroupDetail(el) {
  const e = id => el.querySelector(id);
  e('#gd-close')?.addEventListener('click', () => { S.gSel = null; renderGroups(el); });
  e('#gd-edit')?.addEventListener('click', () => openGroupForm(S.gSel));
  e('#gd-del')?.addEventListener('click', async () => {
    if (!confirm(`Delete group "${S.gSel.name}"?`)) return;
    try { await api.del(`/groups/${S.gSel.id}`); S.gSel = null; toast('Group deleted'); loadGroups(); }
    catch (ex) { toast(ex.message, 'err'); }
  });
  e('#gd-add')?.addEventListener('click', () => openAddPaperModal(S.gSel));
}

document.getElementById('btn-add-grp').addEventListener('click', () => openGroupForm(null));

function openGroupForm(group) {
  const edit = !!group;
  openModal(edit ? 'Edit Group' : 'Add Group', `
    <div class="ff"><label>Name *</label><input id="fg-n" value="${h(group?.name ?? '')}" /></div>
    <div class="ff"><label>Description</label><textarea id="fg-d">${h(group?.description ?? '')}</textarea></div>
    <div class="f-foot">
      <button class="btn btn-secondary" id="mc">Cancel</button>
      <button class="btn btn-primary" id="ms">${edit ? 'Save' : 'Create'}</button>
    </div>`);
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('ms').addEventListener('click', async () => {
    const name = document.getElementById('fg-n').value.trim();
    if (!name) { toast('Name required', 'err'); return; }
    const body = { name, description: document.getElementById('fg-d').value.trim() || null };
    try {
      if (edit) { S.gSel = await api.put(`/groups/${group.id}`, body); toast('Group updated'); }
      else { await api.post('/groups', body); toast('Group created'); }
      closeModal(); loadGroups();
    } catch (ex) { toast(ex.message, 'err'); }
  });
}

async function openAddPaperModal(group) {
  try {
    const d = await api.get('/papers', { limit: 200 });
    const have = new Set((group.papers ?? []).map(p => p.id));
    const avail = d.items.filter(p => !have.has(p.id));
    if (!avail.length) { toast('All papers already in this group', 'err'); return; }

    openModal(`Add paper to "${group.name}"`, `
      <div class="ff"><label>Filter</label><input id="ap-f" placeholder="Type to filter…" /></div>
      <div class="ff"><label>Select paper</label>
        <select id="ap-sel" size="8" style="height:180px">
          ${avail.map(p => `<option value="${p.id}">${h(p.title)}${p.year ? ` (${p.year})` : ''}</option>`).join('')}
        </select>
      </div>
      <div class="f-foot">
        <button class="btn btn-secondary" id="mc">Cancel</button>
        <button class="btn btn-primary" id="ms">Add</button>
      </div>`);

    document.getElementById('ap-f').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      document.querySelectorAll('#ap-sel option').forEach(o => {
        o.hidden = !o.text.toLowerCase().includes(q);
      });
    });
    document.getElementById('mc').addEventListener('click', closeModal);
    document.getElementById('ms').addEventListener('click', async () => {
      const pid = +document.getElementById('ap-sel').value;
      if (!pid) { toast('Select a paper', 'err'); return; }
      try { await api.post(`/groups/${group.id}/papers/${pid}`); toast('Paper added'); closeModal(); loadGroups(); }
      catch (ex) { toast(ex.message, 'err'); }
    });
  } catch (e) { toast(e.message, 'err'); }
}

// ── Authors ───────────────────────────────────────────────────────────
async function loadAuthors() {
  const el = document.getElementById('authors-el');
  el.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const d = await api.get('/authors');
    S.authors = d;
    document.getElementById('cnt-authors').textContent = d.length;
    if (S.aSel) S.aSel = S.authors.find(a => a.id === S.aSel.id) ?? null;
    renderAuthors(el);
  } catch (e) { el.innerHTML = errState(e.message); }
}

function renderAuthors(el) {
  if (!S.authors.length) { el.innerHTML = emptyState('👤', 'No authors yet'); return; }

  const rows = S.authors.map(a => `
    <tr class="${S.aSel?.id === a.id ? 'sel' : ''}" data-aid="${a.id}">
      <td><strong>${h(a.name)}</strong></td>
      <td>${a.email ? h(a.email) : '<span style="color:#94a3b8">–</span>'}</td>
      <td>${(a.affiliations ?? []).map(af => h(af.name)).join(', ') || '<span style="color:#94a3b8">–</span>'}</td>
      <td style="text-align:right">${(a.papers ?? []).length}</td>
    </tr>`).join('');

  const tbl = `
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Affiliations</th><th style="text-align:right">Papers</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  el.innerHTML = S.aSel
    ? `<div class="split has-detail">${tbl}${authorDetail(S.aSel)}</div>`
    : tbl;

  el.querySelectorAll('[data-aid]').forEach(r =>
    r.addEventListener('click', () => { S.aSel = S.authors.find(a => a.id === +r.dataset.aid) ?? null; renderAuthors(el); }));

  bindAuthorDetail(el);
}

function authorDetail(a) {
  return `
    <div class="detail" id="ad">
      <div class="d-hdr">
        <button class="btn btn-secondary btn-sm" id="ad-edit">✏ Edit</button>
        <button class="btn btn-danger btn-sm" id="ad-del">🗑 Delete</button>
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" id="ad-close">✕</button>
      </div>
      <div class="d-ttl">${h(a.name)}</div>
      ${a.email ? `<div class="d-sec"><div class="d-lbl">Email</div><div class="d-val">${h(a.email)}</div></div>` : ''}
      ${(a.affiliations ?? []).length ? `
        <div class="d-sec"><div class="d-lbl">Affiliations</div>
          ${a.affiliations.map(af => `
            <div style="font-size:12px;background:#f8fafc;border-radius:6px;padding:5px 9px;margin-bottom:3px;border:1px solid #e2e8f0">
              <strong>${h(af.name)}</strong>
              ${af.city||af.country ? `<span style="color:#64748b"> · ${[af.city,af.country].filter(Boolean).join(', ')}</span>` : ''}
            </div>`).join('')}
        </div>` : ''}
      ${(a.papers ?? []).length ? `
        <div class="d-sec"><div class="d-lbl">Papers (${a.papers.length})</div>
          ${a.papers.map(p => `
            <div style="font-size:12px;line-height:1.4;padding:4px 0;border-bottom:1px solid #f1f5f9">
              ${h(p.title)}${p.year ? ` <span style="color:#94a3b8">(${p.year})</span>` : ''}
            </div>`).join('')}
        </div>` : '<div class="d-sec"><div class="d-lbl">Papers</div><div style="color:#94a3b8;font-size:12px">None</div></div>'}
    </div>`;
}

function bindAuthorDetail(el) {
  const e = id => el.querySelector(id);
  e('#ad-close')?.addEventListener('click', () => { S.aSel = null; renderAuthors(el); });
  e('#ad-edit')?.addEventListener('click', () => openAuthorForm(S.aSel));
  e('#ad-del')?.addEventListener('click', async () => {
    if (!confirm(`Delete "${S.aSel.name}"?`)) return;
    try { await api.del(`/authors/${S.aSel.id}`); S.aSel = null; toast('Author deleted'); loadAuthors(); }
    catch (ex) { toast(ex.message, 'err'); }
  });
}

function openAuthorForm(author) {
  const edit = !!author;
  openModal(edit ? 'Edit Author' : 'Add Author', `
    <div class="ff"><label>Name *</label><input id="fa-n" value="${h(author?.name ?? '')}" /></div>
    <div class="ff"><label>Email</label><input id="fa-e" type="email" value="${h(author?.email ?? '')}" /></div>
    <div class="f-foot">
      <button class="btn btn-secondary" id="mc">Cancel</button>
      <button class="btn btn-primary" id="ms">${edit ? 'Save' : 'Create'}</button>
    </div>`);
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('ms').addEventListener('click', async () => {
    const name = document.getElementById('fa-n').value.trim();
    if (!name) { toast('Name required', 'err'); return; }
    const body = { name, email: document.getElementById('fa-e').value.trim() || null, affiliations: [] };
    try {
      if (edit) { S.aSel = await api.put(`/authors/${author.id}`, body); toast('Author updated'); }
      else { await api.post('/authors', body); toast('Author created'); }
      closeModal(); loadAuthors();
    } catch (ex) { toast(ex.message, 'err'); }
  });
}

// ── Pagination ────────────────────────────────────────────────────────
function pager(total, off, lim) {
  if (total <= lim) return '';
  const pg = Math.floor(off / lim) + 1, pages = Math.ceil(total / lim);
  return `
    <div class="pager">
      <button data-pp="prev" ${off === 0 ? 'disabled' : ''}>← Prev</button>
      <span class="pager-info">Page ${pg} / ${pages} &nbsp;(${total})</span>
      <button data-pp="next" ${off + lim >= total ? 'disabled' : ''}>Next →</button>
    </div>`;
}
function bindPager(el, key) {
  el.querySelector('[data-pp="prev"]')?.addEventListener('click', () => {
    if (key === 'p') { S.pOff = Math.max(0, S.pOff - S.pLim); loadPapers(); }
  });
  el.querySelector('[data-pp="next"]')?.addEventListener('click', () => {
    if (key === 'p') { S.pOff += S.pLim; loadPapers(); }
  });
}

// ── Modal ─────────────────────────────────────────────────────────────
function openModal(title, bodyHtml) {
  document.getElementById('modal-t').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.querySelector('#modal-body input, #modal-body textarea')?.focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
document.getElementById('modal-x').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────
(async () => {
  await pingApi();
  loadPapers();
  loadGroups();
})();
</script>
